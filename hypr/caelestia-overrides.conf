# Overrides de keybinds para o caelestia.
# Carregado apenas quando o perfil caelestia está ativo (ver hyprland.conf,
# bloco "hyprlang if isCaelestia").
#
# Os keybinds do end-4 dependem de globals "quickshell:*" que não existem no
# caelestia. Aqui damos unbind deles e rebind para os equivalentes do caelestia
# (globals "caelestia:*" e a CLI `caelestia`).

# Captura de tela
unbind = Super+Shift, S
bind = Super+Shift, S, exec, caelestia screenshot -r -f
unbind = , Print
bind = , Print, exec, caelestia screenshot

# Gravação de tela
unbind = Super+Shift, R
bind = Super+Shift, R, exec, caelestia record -r
unbind = Super+Alt, R
bind = Super+Alt, R, exec, caelestia record -s

# Launcher: abre ao soltar o Super, mas é cancelado se outra tecla/clique for
# usada junto. Por isso redirecionamos todo o sistema de interrupt do end-4
# (catchall + Ctrl + mouse) para caelestia:launcherInterrupt.
unbind = Super, Super_L
unbind = Super, Super_R
bind = Super, Super_L, global, caelestia:launcher
bind = Super, Super_R, global, caelestia:launcher
binditn = Super, catchall, global, caelestia:launcherInterrupt
bind = Ctrl, Super_L, global, caelestia:launcherInterrupt
bind = Ctrl, Super_R, global, caelestia:launcherInterrupt
bind = Super, mouse:272, global, caelestia:launcherInterrupt
bind = Super, mouse:273, global, caelestia:launcherInterrupt
bind = Super, mouse:274, global, caelestia:launcherInterrupt
bind = Super, mouse:275, global, caelestia:launcherInterrupt
bind = Super, mouse:276, global, caelestia:launcherInterrupt
bind = Super, mouse:277, global, caelestia:launcherInterrupt
bind = Super, mouse_up, global, caelestia:launcherInterrupt
bind = Super, mouse_down, global, caelestia:launcherInterrupt

# Sidebar / painéis (end-4 usa Super+A, Super+B e Super+O para a sidebar)
unbind = Super, A
bind = Super, A, global, caelestia:sidebar
unbind = Super, B
bind = Super, B, global, caelestia:sidebar
unbind = Super, O
bind = Super, O, global, caelestia:sidebar
unbind = Super, N
bind = Super, N, global, caelestia:sidebar
unbind = Super, G
bind = Super, G, global, caelestia:showall

# Sessão
unbind = Ctrl+Alt, Delete
bind = Ctrl+Alt, Delete, global, caelestia:session

# Área de transferência / emoji
unbind = Super, V
bind = Super, V, exec, pkill fuzzel || caelestia clipboard
unbind = Super, Period
bind = Super, Period, exec, pkill fuzzel || caelestia emoji -p

# Controle de mídia
unbind = Super+Ctrl, M
bind = Super+Ctrl, M, global, caelestia:mediaToggle
